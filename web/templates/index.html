<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM-Bracket-Flow | Prediction Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="dark-theme">
    <div class="glass-background"></div>
    
    <header>
        <div class="logo-container">
            <h1 class="glow-text">MM-BRACKET-FLOW</h1>
            <p class="subtitle">The Hirschy Factor Simulation Engine</p>
        </div>
        <div class="header-controls">
            <select id="year-select" class="premium-select">
                <option value="2026">2026 Tournament</option>
                <option value="2025">2025 (Historical)</option>
                <option value="2024">2024 (Historical)</option>
                <option value="2023">2023 (Historical)</option>
                <option value="2022">2022 (Historical)</option>
                <option value="2021">2021 (Historical)</option>
                <option value="2019">2019 (Historical)</option>
                <option value="2015">2015 (Historical)</option>
                <option value="2010">2010 (Historical)</option>
                <option value="2005">2005 (Historical)</option>
                <option value="2000">2000 (Historical)</option>
            </select>
            <button id="run-sim-btn" class="premium-btn primary">Run Hyper-Simulation</button>
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <section id="simulation-controls" class="glass-card">
                <div class="card-header">
                    <h2>Simulation Settings</h2>
                    <button id="reset-optimal" class="icon-btn" title="Reset to Optimal Factors">🔄</button>
                </div>
                <div class="controls-grid">
                    <div class="setting-item">
                        <label>SOS Factor</label>
                        <input type="range" id="weight-sos" min="0" max="15" step="0.1" value="7.6">
                        <span id="val-sos">7.6</span>
                    </div>
                    <div class="setting-item">
                        <label>TRB Factor</label>
                        <input type="range" id="weight-trb" min="0" max="15" step="0.1" value="4.9">
                        <span id="val-trb">4.9</span>
                    </div>
                    <div class="setting-item">
                        <label>TO Factor</label>
                        <input type="range" id="weight-to" min="0" max="10" step="0.1" value="2.8">
                        <span id="val-to">2.8</span>
                    </div>
                    <div class="setting-item">
                        <label>Efficiency</label>
                        <input type="range" id="weight-eff" min="0" max="0.2" step="0.001" value="0.022">
                        <span id="val-eff">0.022</span>
                    </div>
                    <div class="setting-item">
                        <label>Momentum</label>
                        <input type="range" id="weight-momentum" min="0" max="0.5" step="0.01" value="0.07">
                        <span id="val-momentum">0.07</span>
                    </div>
                </div>
            </section>

            <section id="stats-overview" class="glass-card">
                <div class="card-header">
                    <h2>Field Stats</h2>
                    <div class="badge">Live 2026</div>
                </div>
                <div class="team-grid" id="team-list">
                    <div class="loading-spinner"></div>
                </div>
            </section>
        </aside>

        <section id="bracket-visualization" class="glass-card">
            <div class="card-header">
                <h2 id="view-title">Tournament Flow</h2>
                <div class="view-controls">
                    <button class="tab-btn active" data-mode="deterministic">Chalk</button>
                    <button class="tab-btn" data-mode="monte-carlo">Simulated Chaos</button>
                </div>
            </div>
            <div id="bracket-container" class="bracket-stage">
                <div class="empty-state">
                    <p>Initialize the 2026 bracket flow to begin simulation.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MM-Bracket-Flow. Built for Purdue Dominance.</p>
    </footer>

    <script src="/static/js/main.js" type="module"></script>
</body>
</html>
